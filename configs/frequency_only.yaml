project:
  name: ai_gen_image_detector
  seed: 42
  device: cpu
paths:
  manifest_csv: data/metadata/genimage_manifest.csv
  dataset_csv: data/metadata/genimage_manifest.csv
  feature_dir: artifacts/features
  checkpoint_dir: artifacts/checkpoints/frequency_only
  report_dir: artifacts/reports
data:
  image_size: 512
  batch_size: 16
  num_workers: 0
  label_map:
    real: 0
    fake: 1
clip:
  model_name: ViT-L-14
  pretrained: laion2B-s32B-b82K
  hf_hub_model: hf-hub:laion/CLIP-ViT-L-14-laion2B-s32B-b82K
  fallback_model_name: ViT-L-14
  fallback_pretrained: laion2B-s32B-b82K
  output_dim: 768
  freeze: true
  normalize_feature: true
frequency:
  image_size: 512
  radial_bins: 64
  log_scale: true
  normalize_feature: true
classifier:
  hidden_dim: 256
  dropout: 0.2
train:
  epochs: 20
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 5
  gradient_clip: 1.0
eval:
  threshold: 0.5
robustness:
  jpeg_qualities: [95, 75, 50]
  resize_scales: [0.5, 0.25]
  blur_sigmas: [1.0, 2.0]
