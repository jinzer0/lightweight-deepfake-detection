project:
  name: ai_gen_image_detector_synthbuster_ood
  seed: 42
  device: cuda

paths:
  manifest_csv: outputs/synthbuster_ood/manifest.csv
  dataset_csv: data/metadata/synthbuster_ood_dataset.csv
  raw_data_dir: data/synthbuster
  feature_dir: artifacts/features_synthbuster_ood
  checkpoint_dir: artifacts/checkpoints
  report_dir: outputs/metrics/synthbuster_ood
  figure_dir: outputs/plots/synthbuster_ood
  scaler_dir: artifacts/scalers
  frequency_scaler_path: artifacts/scalers/frequency_scaler.pkl

data:
  image_size: 512
  batch_size: 16
  num_workers: 4
  label_map:
    real: 0
    fake: 1
  splits:
    test: test

clip:
  model_name: ViT-L-14
  pretrained: laion2B-s32B-b82K
  hf_hub_model: hf-hub:laion/CLIP-ViT-L-14-laion2B-s32B-b82K
  fallback_model_name: ViT-L-14
  fallback_pretrained: laion2B-s32B-b82K
  output_dim: 768
  freeze: true
  normalize_feature: true

frequency:
  method: dct
  image_size: 512
  grayscale: true
  radial_bins: 64
  log_scale: true
  normalize_feature: true
  scaler: standard

classifier:
  type: mlp
  hidden_dim: 512
  dropout: 0.2
  num_classes: 1

train:
  epochs: 20
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 5
  gradient_clip: 1.0
  loss: bce_with_logits

eval:
  threshold: 0.5
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
  per_generator: true
  save_predictions: true

robustness:
  jpeg_qualities: [95, 75, 50]
  resize_scales: [0.5, 0.25]
  blur_sigmas: [1.0, 2.0]
